<!DOCTYPE html>
<html lang="en">
<head>
    <title>MUDSHARK</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <div class="container" id="app">
            <div style="font-size: 0.8rem; letter-spacing: 2px; color: #888">FOCUS CONTROL</div>
            <div id="timer" class="timer-display">25:00</div>
            <div id="cntrl" class="controls">
                <button id="strt" class="start">start</button>
                <button id="rst" class="reset">reset</button>
            </div>
            <input type="text" id="taskin" class="taskinput" placeholder="What are you doing?"> 
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
